<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼플스 오타쿠클럽 - 정예 멤버 모집</title>
    <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;900&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #3D4128;
            --neon-yellow: #DFFF00;
            --orange: #FF4500;
            --text-color: #fff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Gothic A1', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 노이즈 효과 */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.1;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 공통 유틸 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
        }

        .text-neon {
            color: var(--neon-yellow);
        }

        .text-orange {
            color: var(--orange);
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* 섹션 공통 */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 0;
        }

        /* 1. Hero Section */
        #hero {
            background: radial-gradient(circle, rgba(0, 0, 0, 0.3) 0%, rgba(61, 65, 40, 1) 100%);
            text-align: center;
            overflow: hidden;
        }

        .hero-title {
            font-size: 5rem;
            line-height: 1.1;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 6px 6px 0px var(--orange);
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(50px);
            animation: slideUp 1s forwards 0.5s;
        }

        .hero-slogan {
            font-size: 1.5rem;
            border: 2px solid var(--neon-yellow);
            padding: 10px 30px;
            display: inline-block;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeIn 1s forwards 1.2s;
        }

        /* 2. Intro Section */
        #intro {
            text-align: center;
        }

        .intro-text {
            font-size: 2.5rem;
            line-height: 1.5;
            max-width: 800px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 1s ease-out;
        }

        .intro-text.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* 3. Character Showcase (Parallax Cards) */
        #showcase {
            background: #2a2d1b;
            overflow: hidden;
        }

        .showcase-title {
            font-size: 3rem;
            margin-bottom: 50px;
            text-shadow: 4px 4px 0 #000;
        }

        .cards-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
        }

        .char-card {
            width: 250px;
            height: 350px;
            position: relative;
            border: 4px solid var(--orange);
            background: #fff;
            overflow: hidden;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.5);
            transform: translateY(100px) rotateY(20deg);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .char-card:hover img {
            transform: scale(1.1);
        }

        .char-card.visible {
            opacity: 1;
            transform: translateY(0) rotateY(0);
        }

        /* 카드 순차 등장 */
        .char-card:nth-child(1) {
            transition-delay: 0.1s;
        }

        .char-card:nth-child(2) {
            transition-delay: 0.3s;
        }

        .char-card:nth-child(3) {
            transition-delay: 0.5s;
        }

        .char-card:nth-child(4) {
            transition-delay: 0.7s;
        }

        .char-card:nth-child(5) {
            transition-delay: 0.9s;
        }

        /* 4. Info Section (Grid) */
        #info {
            background-color: var(--bg-color);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }

        .info-item {
            background: #111;
            border: 2px solid var(--neon-yellow);
            padding: 30px;
            text-align: center;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 0.6s ease;
        }

        .info-item:nth-child(even) {
            transform: translateX(50px);
        }

        .info-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .info-label {
            font-family: 'Press Start 2P', cursive;
            color: var(--neon-yellow);
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: block;
        }

        .info-content {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 5. CTA Section */
        #cta {
            background: url('./assets/new_poster.jpg') no-repeat center center/cover;
            position: relative;
        }

        #cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(61, 65, 40, 0.9);
        }

        .cta-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .join-btn {
            background: var(--orange);
            color: #fff;
            border: 5px solid #000;
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 10px 10px 0 var(--neon-yellow);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
            text-decoration: none;
            animation: pulse 2s infinite;
        }

        .join-btn:hover {
            transform: translate(5px, 5px);
            box-shadow: 5px 5px 0 var(--neon-yellow);
        }

        .disclaimer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Animations */
        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 3rem;
            }

            section {
                min-height: auto;
                padding: 80px 20px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="noise"></div>

    <!-- Hero Section -->
    <section id="hero">
        <div class="container">
            <h1 class="hero-title text-orange">퍼플스<br><span class="text-neon">오타쿠클럽</span><br>발대식</h1>
            <div class="hero-slogan pixel-font">덕질은 혼자보다 같이 할 때 더 즐겁다!</div>
        </div>
    </section>

    <!-- Intro Section -->
    <section id="intro">
        <div class="container">
            <div class="intro-text fade-in-scroll">
                <span class="text-neon pixel-font" style="font-size: 1rem; display:block; margin-bottom:20px;">SYSTEM
                    MESSAGE</span>
                "숨겨왔던 나의 <span class="text-orange">덕력</span>을 봉인 해제하라."<br><br>
                퍼플스 문화체험 동아리에서<br>
                당신의 <span class="text-neon">최애</span>를 영업하세요.
            </div>
        </div>
    </section>

    <!-- Character Showcase -->
    <section id="showcase">
        <div class="container">
            <h2 class="showcase-title text-neon pixel-font" style="text-align: center;">THE 4 KINGS</h2>
            <div class="cards-container">
                <div class="char-card scroll-card">
                    <img src="./assets/char1.png" alt="캐릭터1">
                </div>
                <div class="char-card scroll-card">
                    <img src="./assets/char2.jpg" alt="캐릭터2">
                </div>
                <div class="char-card scroll-card">
                    <img src="./assets/char3.jpg" alt="캐릭터3">
                </div>
                <div class="char-card scroll-card">
                    <img src="./assets/char4.jpg" alt="캐릭터4">
                </div>
                <!-- New Poster added as a special card -->
                <div class="char-card scroll-card">
                    <img src="./assets/new_poster.jpg" alt="스페셜 포스터">
                </div>
            </div>
        </div>
    </section>

    <!-- Info Section -->
    <section id="info">
        <div class="container">
            <div class="info-grid">
                <div class="info-item scroll-side">
                    <span class="info-label">DATE & TIME</span>
                    <div class="info-content">
                        26년 01월 28일 (수)<br>
                        오후 6시 30분
                    </div>
                </div>
                <div class="info-item scroll-side">
                    <span class="info-label">LOCATION</span>
                    <div class="info-content">
                        본사 회의실
                    </div>
                </div>
                <div class="info-item scroll-side">
                    <span class="info-label">TARGET</span>
                    <div class="info-content">
                        애니·서브컬처<br>덕후 누구나
                    </div>
                </div>
                <div class="info-item scroll-side">
                    <span class="info-label">NOTICE</span>
                    <div class="info-content">
                        준비는 촉박!<br>설명은 프리스타일!
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- CTA Section -->
    <section id="cta">
        <div class="cta-content">
            <h2 class="hero-title" style="font-size: 3rem; margin-bottom: 50px;">준비되셨습니까?</h2>
            <a href="#" class="join-btn">광기에 합류하기</a>
            <div class="disclaimer text-neon pixel-font">
                * 선착순 10명 / 심사과정 별도 진행 예정 *
            </div>
        </div>
    </section>

    <script>
        // Intersection Observer for scroll animations
        const observerOptions = {
            threshold: 0.2,
            rootMargin: "0px"
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    // Once visible, we don't need to observe it anymore if we want one-time animation
                    // observer.unobserve(entry.target); 
                }
            });
        }, observerOptions);

        // Target elements
        document.querySelectorAll('.fade-in-scroll').forEach(el => observer.observe(el));
        document.querySelectorAll('.scroll-card').forEach(el => observer.observe(el));
        document.querySelectorAll('.scroll-side').forEach(el => observer.observe(el));

    </script>
</body>

</html>
