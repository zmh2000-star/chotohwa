<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8E44AD" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8E44AD" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E44AD" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8E44AD" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8E44AD" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#0a0a0a"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- 그리드 패턴 -->
  <g opacity="0.05" stroke="#8E44AD" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
  </g>
  <!-- 장식 원 -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="#8E44AD" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="200" r="120" fill="none" stroke="#8E44AD" stroke-width="0.5" opacity="0.1"/>
  <!-- 아이콘 -->
  <text x="400" y="210" font-size="60" text-anchor="middle" dominant-baseline="middle">💜</text>
  <!-- 제목 -->
  <text x="400" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="3">JAKOMO</text>
  <text x="400" y="355" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#8E44AD" text-anchor="middle" opacity="0.8" letter-spacing="2">Premium Matching</text>
  <!-- 하단 라인 -->
  <rect x="350" y="380" width="100" height="2" rx="1" fill="#8E44AD" opacity="0.4"/>
</svg>