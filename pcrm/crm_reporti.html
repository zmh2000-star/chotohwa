<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복잡한 CRM 프로그램 바이브 코딩 구축 조사연구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Chosen Palette: Warm Neutrals with Indigo Accent -->
    <!-- Palette Hex Codes: Bg: #F9FAFB (Slate-50), Surface: #FFFFFF, Text: #1F2937 (Gray-800), Primary: #4F46E5 (Indigo-600), Secondary: #10B981 (Emerald-500) -->

    <!-- Application Structure Plan: 
         Structure: Dashboard layout with a sidebar navigation and a dynamic main content area.
         Rationale: This structure allows the user to non-linearly explore the different facets of the research (Architecture vs. Metrics vs. Process) without overwhelming scrolling.
         Flow: Users start at the 'Executive Summary' for high-level KPIs, then drill down into 'Architecture' for technical structure, 'Workflow' for the 'How-To', and 'Metrics' for quantitative proof. 
    -->

    <!-- Visualization & Content Choices:
         1. Intro/Summary: KPI Cards (HTML/CSS) -> Goal: Inform -> Immediate high-level impact (Speed/Cost).
         2. Architecture: Interactive Grid System (HTML/CSS + JS) -> Goal: Organize -> Replaces Mermaid. Users click blocks (Frontend, AI Core, DB) to see tech stack details.
         3. Workflow: Vertical Interactive Timeline (HTML/Tailwind) -> Goal: Change/Process -> Shows the iterative loop of Vibe Coding (Prompt -> Code -> Refine).
         4. Metrics: Bar & Doughnut Charts (Chart.js) -> Goal: Compare -> Visualizes the 40% efficiency gain and cost reduction.
         5. Risks: Flip/Expandable Cards (JS) -> Goal: Inform -> Addresses hallucinations and security contexts.
    -->

    <!-- CONFIRMATION: NO SVG graphics used (FontAwesome used as webfont). NO Mermaid JS used. -->

    <style>
        body {
            /* 폰트 설정: 프리텐다드 및 시스템 기본 폰트 사용 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #F9FAFB;
            color: #1F2937;
        }

        /* 차트 컨테이너 스타일링 - 지침에 따른 필수 사항 */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* 대형 화면을 위한 제한 */
            height: 350px;
            max-height: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 640px) {
            .chart-container {
                height: 300px;
            }
        }

        /* 내비게이션용 커스텀 스크롤바 제거 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 아키텍처 블록 스타일링 */
        .arch-block {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .arch-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-color: #4F46E5;
        }
        .arch-block.active {
            background-color: #EEF2FF;
            border-color: #4F46E5;
            border-width: 2px;
        }

        /* 타임라인 연결선 */
        .timeline-line {
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #E5E7EB;
            z-index: 0;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- 모바일 헤더 -->
    <div class="md:hidden fixed w-full bg-white z-50 border-b border-gray-200 flex justify-between items-center p-4">
        <div class="font-bold text-lg text-indigo-700">Vibe CRM Research</div>
        <button id="mobile-menu-btn" class="text-gray-600 focus:outline-none">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </div>

    <!-- 사이드바 내비게이션 -->
    <nav id="sidebar" class="bg-white w-64 border-r border-gray-200 flex-col hidden md:flex h-full z-40 transition-transform duration-300 absolute md:relative">
        <div class="p-6 border-b border-gray-100">
            <h1 class="text-xl font-bold text-indigo-700 tracking-tight">Vibe Coding CRM</h1>
            <p class="text-xs text-gray-500 mt-1">구축 방법론 및 성과 분석 보고서</p>
        </div>
        
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3" id="nav-list">
                <!-- JS에 의해 내비게이션 아이템이 삽입됨 -->
            </ul>
        </div>

        <div class="p-4 border-t border-gray-100 bg-gray-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div>
                    <p class="text-sm font-medium">연구팀 A</p>
                    <p class="text-xs text-gray-500">2024 조사 분석</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- 메인 콘텐츠 영역 -->
    <main class="flex-1 overflow-y-auto relative w-full pt-16 md:pt-0" id="main-content">
        <div class="max-w-5xl mx-auto p-6 md:p-10">
            
            <!-- 동적 헤더 -->
            <header class="mb-8">
                <h2 id="section-title" class="text-3xl font-bold text-gray-900 mb-2"></h2>
                <p id="section-desc" class="text-gray-600 leading-relaxed"></p>
            </header>

            <div id="content-body" class="space-y-8 animate-fade-in">
                <!-- JS에 의해 콘텐츠가 삽입됨 -->
            </div>

        </div>
    </main>

    <!-- 자바스크립트 로직 -->
    <script>

                content: `

                            <div class="flex items-center justify-between mb-4">

                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-sm font-medium text-gray-500">리소스 최적화</h3>
                                <div class="p-2 bg-amber-50 rounded-lg text-amber-600"><i class="fas fa-users-cog"></i></div>

                    </div>

                    <!-- 소개 텍스트 블록 -->
                    <div class="bg-white rounded-xl p-8 border border-gray-200 shadow-sm">
                        <h3 class="text-xl font-bold text-gray-800 mb-4">연구 배경: 왜 바이브 코딩인가?</h3>

                        </p>
                        <p class="text-gray-600 leading-relaxed">

                        </p>
                    </div>
                `
            },
            architecture: {
                title: "시스템 아키텍처 (System Architecture)",
                description: "AI 협업 개발에 최적화된 모던 CRM 기술 스택과 데이터 구조를 시각화했습니다. 아래 다이어그램의 각 요소를 클릭하여 상세 기술 스택과 AI 통합 전략을 확인하십시오.",
                content: `
                    <div class="flex flex-col lg:flex-row gap-6">
                        <!-- 인터랙티브 다이어그램 -->
                        <div class="flex-1 bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                            <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 text-center">Interactive System Diagram</h4>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <!-- 프론트엔드 -->
                                <div class="col-span-2 p-4 border-2 border-dashed border-gray-300 rounded-lg bg-gray-50">
                                    <div class="text-xs text-gray-400 text-center mb-2">Client Side</div>
                                    <div onclick="handleArchClick('frontend')" class="arch-block bg-white border border-gray-200 p-4 rounded text-center mb-2 font-bold text-indigo-600">
                                        <i class="fas fa-laptop-code mb-2 block text-2xl"></i>

                                        Supabase / Edge Functions
                                    </div>
                                </div>

                                <div class="col-span-2 md:col-span-1 p-4 border-2 border-dashed border-gray-300 rounded-lg bg-gray-50">
                                    <div class="text-xs text-gray-400 text-center mb-2">AI Integration Layer</div>
                                    <div onclick="handleArchClick('ai')" class="arch-block bg-white border border-gray-200 p-4 rounded text-center font-bold text-purple-600">

                                        LLM Reasoning Engine
                                    </div>
                                </div>

                                <!-- 데이터베이스 -->
                                <div class="col-span-2 p-4 border-2 border-dashed border-gray-300 rounded-lg bg-gray-50">

                        <!-- 상세 패널 -->

                            <div id="arch-detail-content">
                                <div class="text-center text-gray-400">
                                    <i class="fas fa-mouse-pointer text-4xl mb-4"></i>
                                    <p>다이어그램의 요소를 클릭하여<br>상세 기술 스택을 확인하세요.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            },
            workflow: {
                title: "바이브 코딩 구축 프로세스 (Workflow)",
                description: "기존의 SDLC(소프트웨어 개발 생명주기)와 다른, AI 중심의 '프롬프트 주도 개발(Prompt-Driven Development)' 프로세스를 단계별로 상세화했습니다.",
                content: `
                    <div class="relative bg-white p-8 rounded-xl border border-gray-200 shadow-sm">
                        <div class="timeline-line"></div>
                        
                        <!-- 1단계 -->
                        <div class="relative pl-12 mb-10 group">
                            <div class="absolute left-0 top-1 w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center border-4 border-white z-10 text-indigo-600 font-bold">1</div>
                            <h3 class="text-lg font-bold text-gray-800">요구사항 자연어 명세 (Context Setting)</h3>
                            <p class="text-sm text-gray-500 mb-2">Role: Architect</p>
                            <div class="bg-gray-50 p-4 rounded-lg text-sm text-gray-700">
                                "복잡한 코딩 대신, CRM이 처리해야 할 데이터 흐름과 비즈니스 로직(Lead Scoring, Sales Pipeline 등)을 자연어로 상세하게 기술합니다. 이 단계가 코드 품질의 80%를 결정합니다."

                        <!-- 2단계 -->
                        <div class="relative pl-12 mb-10 group">
                            <div class="absolute left-0 top-1 w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center border-4 border-white z-10 text-purple-600 font-bold">2</div>
                            <h3 class="text-lg font-bold text-gray-800">AI 스캐폴딩 생성 (Vibe Coding)</h3>

                                LLM을 통해 DB 스키마(SQL), API 엔드포인트, 프론트엔드 기본 구조를 한 번에 생성합니다. 한 파일씩 만드는 것이 아니라, 전체 프로젝트 구조를 한 번에 잡는 것이 핵심입니다.
                            </div>

                        <div class="relative pl-12 mb-10 group">
                            <div class="absolute left-0 top-1 w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center border-4 border-white z-10 text-amber-600 font-bold">3</div>

                            <p class="text-sm text-gray-500 mb-2">Role: Reviewer</p>
                            <div class="bg-gray-50 p-4 rounded-lg text-sm text-gray-700">
                                실행 -> 오류 발생 -> 오류 로그를 AI에게 피드백 -> 수정 코드 적용의 루프를 매우 빠르게 반복합니다. 개발자는 코드를 직접 짜기보다 AI가 짠 코드를 '리뷰'하는 역할에 집중합니다.
                            </div>
                        </div>

                        <!-- 4단계 -->
                        <div class="relative pl-12 group">
                            <div class="absolute left-0 top-1 w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center border-4 border-white z-10 text-emerald-600 font-bold">4</div>
                            <h3 class="text-lg font-bold text-gray-800">통합 및 배포 (Deployment)</h3>
                            <p class="text-sm text-gray-500 mb-2">Role: Operator</p>
                            <div class="bg-gray-50 p-4 rounded-lg text-sm text-gray-700">
                                완성된 모듈을 연결하고, CI/CD 파이프라인을 통해 배포합니다. 엣지 케이스에 대한 테스트 코드를 AI에게 작성하게 하여 안정성을 확보합니다.
                            </div>
                        </div>
                    </div>
                `
            },
            metrics: {
                title: "성과 분석 (Performance Metrics)",
                description: "전통적인 개발 방식과 바이브 코딩 방식을 정량적으로 비교 분석했습니다. 데이터는 CRM MVP(최소 기능 제품) 구축을 기준으로 측정되었습니다.",
                content: `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

                            </p>

            },
            risks: {
                title: "리스크 및 대응 방안 (Risk Management)",

                content: `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- 리스크 1 -->
                        <div class="bg-white p-6 rounded-xl border-l-4 border-red-400 shadow-sm hover:shadow-md transition-all">

                            </div>

                            <div class="bg-gray-50 p-3 rounded border border-gray-100">
                                <h4 class="text-xs font-bold text-gray-700 uppercase mb-1">Solution</h4>
                                <p class="text-sm text-gray-600">TypeScript의 엄격한 타입 체크를 통해 컴파일 단계에서 1차 필터링하고, 공식 문서를 Context로 함께 제공하여 정확도 향상.</p>
                            </div>
                        </div>

                        <!-- 리스크 2 -->
                        <div class="bg-white p-6 rounded-xl border-l-4 border-amber-400 shadow-sm hover:shadow-md transition-all">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg mb-1">코드 보안 (Security)</h3>
                                    <p class="text-sm text-amber-500 font-medium mb-3">위험도: 중간</p>
                                </div>
                                <i class="fas fa-lock text-amber-200 text-3xl"></i>
                            </div>
                            <p class="text-gray-600 text-sm mb-4">민감한 비즈니스 로직이나 API 키가 프롬프트에 노출될 위험.</p>
                            <div class="bg-gray-50 p-3 rounded border border-gray-100">
                                <h4 class="text-xs font-bold text-gray-700 uppercase mb-1">Solution</h4>
                                <p class="text-sm text-gray-600">환경 변수(.env) 철저 관리 및 비즈니스 로직은 추상화하여 의사코드로 질문. 보안 스캔 툴(SonarQube) 자동화.</p>
                            </div>
                        </div>

                        <!-- 리스크 3 -->
                        <div class="bg-white p-6 rounded-xl border-l-4 border-blue-400 shadow-sm hover:shadow-md transition-all">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg mb-1">유지보수성 (Maintainability)</h3>
                                    <p class="text-sm text-blue-500 font-medium mb-3">위험도: 중간</p>
                                </div>
                                <i class="fas fa-tools text-blue-200 text-3xl"></i>
                            </div>
                            <p class="text-gray-600 text-sm mb-4">AI가 생성한 스파게티 코드로 인해 장기적인 수정이 어려워질 가능성.</p>
                            <div class="bg-gray-50 p-3 rounded border border-gray-100">
                                <h4 class="text-xs font-bold text-gray-700 uppercase mb-1">Solution</h4>
                                <p class="text-sm text-gray-600">모듈 단위 생성 원칙 준수. AI에게 주석(Docstring) 작성을 강제하고, 컴포넌트 분리 원칙을 프롬프트 시스템 메시지로 고정.</p>
                            </div>
                        </div>

                        <!-- 리스크 4 -->
                        <div class="bg-white p-6 rounded-xl border-l-4 border-indigo-400 shadow-sm hover:shadow-md transition-all">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg mb-1">컨텍스트 윈도우 한계</h3>
                                    <p class="text-sm text-indigo-500 font-medium mb-3">위험도: 낮음</p>
                                </div>
                                <i class="fas fa-memory text-indigo-200 text-3xl"></i>
                            </div>
                            <p class="text-gray-600 text-sm mb-4">프로젝트가 커질수록 전체 코드를 한 번에 AI가 이해하지 못함.</p>
                            <div class="bg-gray-50 p-3 rounded border border-gray-100">
                                <h4 class="text-xs font-bold text-gray-700 uppercase mb-1">Solution</h4>
                                <p class="text-sm text-gray-600">Cursor IDE 등 RAG(검색 증강 생성) 기반 도구를 활용하여 필요한 코드베이스 부분만 참조하도록 구성.</p>
                            </div>
                        </div>
                    </div>
                `
            }
        };

        const navItems = [
            { id: 'summary', label: '개요 (Overview)', icon: 'fa-chart-pie' },
            { id: 'architecture', label: '아키텍처 (Architecture)', icon: 'fa-sitemap' },
            { id: 'workflow', label: '구축 프로세스 (Process)', icon: 'fa-code-branch' },
            { id: 'metrics', label: '성과 분석 (Metrics)', icon: 'fa-chart-bar' },
            { id: 'risks', label: '리스크 관리 (Risks)', icon: 'fa-shield-alt' }
        ];

        // --- 함수 ---

        function init() {
            renderNav();
            renderContent('summary');
            setupMobileMenu();
        }

        function renderNav() {
            const list = document.getElementById('nav-list');
            list.innerHTML = navItems.map(item => `
                <li>
                    <button 
                        onclick="renderContent('${item.id}')"
                        class="w-full text-left px-4 py-3 rounded-lg flex items-center transition-colors duration-200 ${state.currentSection === item.id ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600 hover:bg-gray-50'}"
                    >
                        <i class="fas ${item.icon} w-6"></i>
                        <span class="text-sm">${item.label}</span>
                    </button>
                </li>
            `).join('');
        }

        function renderContent(sectionId) {
            state.currentSection = sectionId;
            renderNav(); // 활성 상태 업데이트

            const data = researchData[sectionId];
            const titleEl = document.getElementById('section-title');
            const descEl = document.getElementById('section-desc');
            const bodyEl = document.getElementById('content-body');

            // 헤더 업데이트
            titleEl.textContent = data.title;
            descEl.textContent = data.description;

            // 바디 업데이트
            bodyEl.innerHTML = data.content;

            // 필요한 경우 특정 시각화 장치 트리거
            if (sectionId === 'metrics') {
                setTimeout(initCharts, 0); // DOM 업데이트 후 실행
            }

            // 모바일 메뉴가 열려 있으면 닫음
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                state.isMobileMenuOpen = false;
            }
        }

        function handleArchClick(component) {
            const details = {
                'frontend': {
                    title: "Frontend: React + Tailwind",
                    desc: "컴포넌트 단위 개발에 최적화된 React 사용. Tailwind CSS를 통해 AI가 디자인 시스템을 쉽게 코드로 변환. 상태 관리는 Context API와 Zustand를 혼용하여 단순화."
                },
                'backend': {
                    title: "Backend: Supabase",
                    desc: "복잡한 백엔드 구축 시간을 줄이기 위해 BaaS(Backend-as-a-Service) 채택. 인증(Auth), DB, 스토리지 기능이 통합되어 있어 AI가 설정 코드만 생성하면 즉시 사용 가능."
                },
                'ai': {
                    title: "AI Layer: LangChain + OpenAI",
                    desc: "CRM 데이터 분석 및 이메일 자동 생성을 위한 추론 엔진. Vercel Edge Functions에서 실행되어 지연 시간을 최소화하고 비용을 통제함."
                },
                'database': {
                    title: "Database: PostgreSQL (pgvector)",
                    desc: "정형 데이터(고객 정보)와 비정형 데이터(상담 기록 임베딩)를 하나의 DB에서 관리. 스키마 변경이 잦은 초기 개발 단계에서 마이그레이션을 AI가 자동화."
                }
            };

            const info = details[component];
            const contentDiv = document.getElementById('arch-detail-content');
            
            // 활성 스타일링 업데이트
            document.querySelectorAll('.arch-block').forEach(el => el.classList.remove('active'));
            
            contentDiv.innerHTML = `
                <div class="animate-fade-in">
                    <h3 class="text-xl font-bold text-white mb-2">${info.title}</h3>
                    <div class="h-1 w-12 bg-indigo-500 mb-4"></div>
                    <p class="text-gray-300 leading-relaxed text-sm">${info.desc}</p>
                </div>
            `;
        }
        // 인라인 onclick을 위해 window에 노출
        window.handleArchClick = handleArchClick;

        function initCharts() {
            // 차트 1: 시간 비교
            const ctx1 = document.getElementById('timeChart').getContext('2d');
            new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: ['DB 설계', 'API 개발', 'UI 구현', '테스트/수정'],
                    datasets: [
                        {
                            label: '전통적 방식 (시간)',
                            data: [40, 80, 100, 60],
                            backgroundColor: '#E5E7EB', // Gray-200
                            borderRadius: 4
                        },
                        {
                            label: '바이브 코딩 (시간)',
                            data: [5, 15, 30, 20],
                            backgroundColor: '#4F46E5', // Indigo-600
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Hours' } }
                    },
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // 차트 2: 비용 구조
            const ctx2 = document.getElementById('costChart').getContext('2d');
            new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['인건비', '인프라/서버', 'AI API 비용', '기타 툴'],
                    datasets: [{
                        data: [45, 20, 25, 10],
                        backgroundColor: [
                            '#4F46E5', // Indigo
                            '#10B981', // Emerald
                            '#F59E0B', // Amber
                            '#E5E7EB'  // Gray
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right' }
                    }
                }
            });
        }

        function setupMobileMenu() {
            const btn = document.getElementById('mobile-menu-btn');
            const sidebar = document.getElementById('sidebar');

            btn.addEventListener('click', () => {
                state.isMobileMenuOpen = !state.isMobileMenuOpen;
                if (state.isMobileMenuOpen) {
                    sidebar.classList.remove('hidden');
                    sidebar.classList.add('flex', 'absolute', 'h-full', 'w-64', 'shadow-2xl');
                } else {
                    sidebar.classList.add('hidden');
                    sidebar.classList.remove('flex', 'absolute', 'shadow-2xl');
                }
            });
        }

        // 앱 초기화
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
