<style type="text/css">
	body{ margin:0; padding:0;}
	
    video#bgvid {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -100;
            background-size: cover;
    }
    
	 
    video {
            position:fixed;
            top:50%;left:50%;
            min-width:100%;min-height:100%;width:auto;height:auto;z-index:-100;
            -webkit-transform:translateX(-50%) translateY(-50%);
            transform:translateX(-50%) translateY(-50%);            
            background-size:cover;-webkit-transition:1s opacity;transition:1s opacity
    }

</style>
 
  
 
</head>
<body>
	<div>
		<video autoplay loop muted id="bgvid">
			<source src="abc.mp4" type="video/mp4">
		</video>
	</div>
	<div style="width:100%; height:900px; background:#000; margin:auto; opacity:0.5;">
		하단 컨텐츠 테스트
	</div>
	<div style="width:100%; height:1000px; background:#F00; margin:auto;">
		하단 컨텐츠 테스트
	</div>
	
	
	
</body>
