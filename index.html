<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초토화군단 프로젝트 오픈</title>

  <!-- Google Fonts: 미래지향적인 Orbitron, Share Tech Mono 및 Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700;900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/main.css" />

  <!-- GSAP Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

  <!-- 1. 비디오 배경 (JS에서 모바일/PC 감지 후 src 주입) -->
  <div class="video-container" id="videoContainer">
    <!-- 비디오가 로드되기 전에 source를 넣기 위해 비워둠 -->
    <video id="introVideo" autoplay muted playsinline></video>
  </div>

  <!-- 2. 이미지 및 글래스모피즘 카운트다운 영역 -->
  <div class="main-content" id="mainContent">
    <!-- 배경 이미지 (CSS 미디어쿼리로 PC/모바일 분기) -->
    <div class="bg-image" id="bgImage"></div>
    <div class="overlay"></div>

    <!-- 3D 틸트 호버가 적용될 컨테이너 -->
    <div class="content-wrapper" id="tiltWrapper">
      <div class="hud-panel">
        <div class="profile-badge">
          <img src="img/장명환프사.webp" alt="Creator Profile">
        </div>
        <div class="slogan-wrapper">
          <span class="eyebrow">새로운 파괴적 혁신,</span>
          <h1 class="slogan">
            초토화군단의 <span class="text-gradient">미친 꿈을 위대하게 만들</span><br/>
            프로젝트가 곧 공개됩니다.
          </h1>
        </div>
        <div class="target-date">2026. 09. 01</div>

        <!-- Timer Gradient Defs -->
        <svg width="0" height="0" style="position: absolute;">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f3ff" />
              <stop offset="50%" stop-color="#b900ff" />
              <stop offset="100%" stop-color="#ff0099" />
            </linearGradient>
          </defs>
        </svg>


        <div class="countdown" id="countdown">
          <!-- DAYS -->
          <div class="time-block">
            <svg class="progress-ring" viewBox="0 0 150 150" width="100%" height="100%">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" stroke="url(#ringGrad)" id="ring-days" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="days">00</span>
              <span class="label">DAYS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- HOURS -->
          <div class="time-block">
            <svg class="progress-ring" viewBox="0 0 150 150" width="100%" height="100%">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" stroke="url(#ringGrad)" id="ring-hours" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="hours">00</span>
              <span class="label">HOURS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- MINS -->
          <div class="time-block">
            <svg class="progress-ring" viewBox="0 0 150 150" width="100%" height="100%">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" stroke="url(#ringGrad)" id="ring-mins" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="mins">00</span>
              <span class="label">MINS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- SECS -->
          <div class="time-block">
            <svg class="progress-ring" viewBox="0 0 150 150" width="100%" height="100%">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" stroke="url(#ringGrad)" id="ring-secs" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="secs">00</span>
              <span class="label">SECS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- MS -->
          <div class="time-block" id="msBlock">
            <svg class="progress-ring" viewBox="0 0 150 150" width="100%" height="100%">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" stroke="url(#ringGrad)" id="ring-ms" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="ms">00</span>
              <span class="label">MS</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
