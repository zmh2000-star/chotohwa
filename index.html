<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초토화군단 프로젝트 오픈</title>
  <link rel="stylesheet" href="css/main.css" />
  <!-- GSAP Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>



  <!-- 1. 비디오 배경 -->
  <div class="video-container" id="videoContainer">
    <!-- autoplay muted playsinline 필수(엔터 없이 즉시 재생 시) -->
    <video id="introVideo" autoplay muted playsinline>
      <source src="movie/chotohwa_count_down2.mp4" type="video/mp4" />
      브라우저가 비디오를 지원하지 않습니다.
    </video>
  </div>

  <!-- 2. 이미지 및 카운트다운 영역 (처음에는 숨김) -->
  <div class="main-content" id="mainContent">
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <div class="content-wrapper">
      <h1 class="slogan glow-text">초토화군단 프로젝트 오픈</h1>
      
      <div class="target-date">2026. 09. 01</div>

      <div class="countdown" id="countdown">
        <div class="time-block">
          <span class="number" id="days">00</span>
          <span class="label">DAYS</span>
        </div>
        <div class="time-divider">:</div>
        <div class="time-block">
          <span class="number" id="hours">00</span>
          <span class="label">HOURS</span>
        </div>
        <div class="time-divider">:</div>
        <div class="time-block">
          <span class="number" id="mins">00</span>
          <span class="label">MINS</span>
        </div>
        <div class="time-divider">:</div>
        <div class="time-block">
          <span class="number" id="secs">00</span>
          <span class="label">SECS</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
