<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초토화군단 프로젝트 오픈</title>

  <!-- Google Fonts: 미래지향적인 Orbitron, Share Tech Mono 및 Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;700;900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="css/main.css" />

  <!-- GSAP Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

  <!-- 1. 비디오 배경 (JS에서 모바일/PC 감지 후 src 주입) -->
  <div class="video-container" id="videoContainer">
    <!-- 비디오가 로드되기 전에 source를 넣기 위해 비워둠 -->
    <video id="introVideo" autoplay muted playsinline></video>
  </div>

  <!-- 2. 이미지 및 글래스모피즘 카운트다운 영역 -->
  <div class="main-content" id="mainContent">
    <!-- 배경 이미지 (CSS 미디어쿼리로 PC/모바일 분기) -->
    <div class="bg-image" id="bgImage"></div>
    <div class="overlay"></div>

    <!-- 3D 틸트 호버가 적용될 컨테이너 -->
    <div class="content-wrapper" id="tiltWrapper">
      <div class="hud-panel">
        <h1 class="slogan glow-text">초토화군단 신규 프로젝트 오픈</h1>
        <div class="target-date">2026. 09. 01</div>

        <div class="countdown" id="countdown">
          <!-- DAYS -->
          <div class="time-block">
            <svg class="progress-ring" width="150" height="150">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" id="ring-days" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="days">00</span>
              <span class="label">DAYS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- HOURS -->
          <div class="time-block">
            <svg class="progress-ring" width="150" height="150">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" id="ring-hours" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="hours">00</span>
              <span class="label">HOURS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- MINS -->
          <div class="time-block">
            <svg class="progress-ring" width="150" height="150">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" id="ring-mins" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="mins">00</span>
              <span class="label">MINS</span>
            </div>
          </div>

          <div class="time-divider">:</div>

          <!-- SECS -->
          <div class="time-block">
            <svg class="progress-ring" width="150" height="150">
              <circle class="ring-bg" cx="75" cy="75" r="70"></circle>
              <circle class="ring-progress" id="ring-secs" cx="75" cy="75" r="70"></circle>
            </svg>
            <div class="time-content">
              <span class="number" id="secs">00</span>
              <span class="label">SECS</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>

</html>
